name: visiosphere_mobile
description: "A mobile application for care monitoring and support."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.1.5+1
  go_router: ^10.0.0
  animate_do: ^3.0.2
  smooth_page_indicator: ^1.1.0
  http: ^1.6.0
  image_picker: ^1.2.1
  table_calendar: ^3.2.0
  pdf: ^3.12.0
  printing: ^5.14.3
  file_picker: ^8.0.0
  excel: ^4.0.0
  path_provider: ^2.1.2
  fl_chart: ^0.70.2
  shared_preferences: ^2.2.2
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/visio.png
    - assets/images/visiologo.png