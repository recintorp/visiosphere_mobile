name: visiosphere_mobile
description: "A mobile application for care monitoring and support."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # ── UI & Navigation ────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.2
  provider: ^6.1.5+1
  go_router: ^10.0.0
  animate_do: ^3.0.2
  smooth_page_indicator: ^1.1.0
  font_awesome_flutter: ^11.0.0
  fl_chart: ^1.2.0
  flutter_html: ^3.0.0-beta.2
  quill_html_editor: ^2.2.8

  # ── Networking ─────────────────────────────────────────────────────────────
  dio: ^5.7.0
  http: ^1.6.0
  socket_io_client: ^3.1.4

  # ── Storage & Security ─────────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.5.5

  # ── Media & Files ──────────────────────────────────────────────────────────
  image_picker: ^1.2.1
  file_picker: ^8.0.0
  excel: ^4.0.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  flutter_mjpeg: ^2.0.4
  audioplayers: ^6.6.0
  printing: ^5.14.3
  pdf: ^3.12.0

  # ── Calendar & Charts ──────────────────────────────────────────────────────
  table_calendar: ^3.2.0
  vector_math: ^2.1.4

  # ── Firebase ───────────────────────────────────────────────────────────────
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^17.2.2

  # ── Background & Foreground Service ────────────────────────────────────────
  flutter_foreground_task: ^8.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/logogo.png
    - assets/images/visio.png
    - assets/images/visiologo.png
    - assets/sounds/

dependency_overrides:
  file_picker: ^8.0.0
  http: ^1.6.0